<!doctype html>

        <style>

            .dotted-leader {
                flex-grow: 1;
                border-bottom: 2px dotted #cbd5e1;
                margin: 0 8px 5px 8px;
            }
            /* Custom clamp for smooth font scaling */
            .text-responsive-header {

    <body class="p-2 sm:p-4 md:p-12">
        <!-- Isola Menu -->
